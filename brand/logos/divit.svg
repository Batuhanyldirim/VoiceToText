<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Divit logo">
  <!-- Divit: Ottoman scribe's inkwell + reed pen. Ink ripples double as an audio waveform. -->
  <defs>
    <linearGradient id="divit-well" x1="34" y1="70" x2="94" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C5766"/>
      <stop offset="1" stop-color="#17414E"/>
    </linearGradient>
  </defs>
  <!-- inkwell vessel: rounded trapezoid -->
  <path d="M40 74 h48 a6 6 0 0 1 6 6 l-5 26 a10 10 0 0 1 -10 8 H49 a10 10 0 0 1 -10 -8 l-5 -26 a6 6 0 0 1 6 -6 Z" fill="url(#divit-well)"/>
  <!-- ink surface highlight -->
  <ellipse cx="64" cy="79" rx="24" ry="4.5" fill="#2C7C8C" opacity="0.55"/>
  <!-- waveform / ink ripples rising from the well -->
  <g stroke="#17414E" stroke-width="6.5" stroke-linecap="round">
    <path d="M50 66 V52"/>
    <path d="M64 66 V34"/>
    <path d="M78 66 V46"/>
  </g>
  <!-- reed pen nib angling in from upper right; tip = record/location dot -->
  <path d="M104 22 L74 60" stroke="#C6963F" stroke-width="7" stroke-linecap="round"/>
  <path d="M104 22 l6 -6 6 8 -8 6 z" fill="#C6963F"/>
  <circle cx="74" cy="60" r="6.5" fill="#C6963F"/>
</svg>
