[project]
name = "stt-eval"
version = "0.1.0"
description = "Turkish-aware transcription accuracy harness (WER/CER + term recall + DER/cpWER)"
requires-python = ">=3.11,<3.12"

# Dev-only measurement package. The pure normalize/metrics code needs jiwer;
# DER/cpWER use pyannote.metrics, which is ALREADY present transitively via
# stt-core's pyannote-audio pin (verified: importing it does NOT load torch), so
# it is not a new dependency here. jiwer is kept behind an optional extra so the
# base install stays minimal, mirroring note-core's `claude` extra:
#     uv sync --extra eval
# Verified pin-safe: adding jiwer pulls only jiwer + rapidfuzz — it does NOT move
# the load-bearing torch/pyannote/transformers/ctranslate2 pins (ADR-0002).
dependencies = [
    "stt-core",   # imported (lazily) by the run driver to produce transcripts
]

[project.optional-dependencies]
eval = ["jiwer>=4.0"]

[tool.uv.sources]
stt-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stt_eval"]
